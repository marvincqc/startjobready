<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeBuilder — Build Your Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Keep all your existing styles */
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-light: #eff6ff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-name { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
.lang-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.progress-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 500;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
}

main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 80px;
}

.wizard {
  width: 100%;
  max-width: 540px;
}

.step-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 36px 32px;
  animation: fadeUp 0.3s ease;
  display: none;
}
.step-card.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 52px; height: 52px;
  background: var(--accent-light);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}
.step-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.step-q {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}
.step-hint {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

.field {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  background: #fff;
}
.field:focus { border-color: var(--accent); }
.field.error { border-color: var(--error); background: var(--error-light); }
.field-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 6px;
  font-weight: 500;
  display: none;
}
.field-error.show { display: block; }

.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.opts-grid.single { grid-template-columns: 1fr; }

.opt-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.3;
}
.opt-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.opt-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

.multi-done {
  margin-top: 14px;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.multi-done:hover { background: var(--accent-dark); }
.multi-done.show { display: block; }

.nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-back {
  flex: 0 0 auto;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--text); color: var(--text); }
.btn-next {
  flex: 1;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-next:hover { background: var(--accent-dark); }
.btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.review-section { margin-bottom: 20px; }
.review-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.review-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bg);
  cursor: pointer;
  border-radius: 6px;
  padding-left: 4px;
  transition: background 0.1s;
}
.review-row:hover { background: var(--bg); }
.review-row:last-child { border-bottom: none; }
.review-ic { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.review-lb { font-size: 11px; color: var(--muted); font-weight: 500; min-width: 90px; margin-top: 2px; }
.review-val { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }
.review-edit { font-size: 12px; color: var(--accent); font-weight: 500; flex-shrink: 0; }

.btn-submit {
  width: 100%;
  background: var(--success);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s;
}
.btn-submit:hover { background: #15803d; }
.btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.success-screen {
  text-align: center;
  padding: 20px 0;
}
.success-icon {
  font-size: 56px;
  margin-bottom: 20px;
  display: block;
}
.success-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.success-msg {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
}

.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 15px; font-weight: 500; color: var(--muted); }

/* Photo step styles */
.file-input {
  width: 100%;
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 12px;
}
.preview-img {
  max-width: 100%;
  max-height: 200px;
  margin: 12px 0;
  border-radius: 8px;
}
.ocr-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  margin: 12px 0;
}
.ocr-loading .spinner-small {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@media (max-width: 480px) {
  .step-card { padding: 24px 20px; }
  .step-q { font-size: 19px; }
  .opts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-name">ResumeBuilder</div>
  </div>
  <select class="lang-select" id="langSel">
    <option value="en">🇬🇧 English</option>
    <option value="zh">🇨🇳 中文</option>
    <option value="ms">🇲🇾 Melayu</option>
    <option value="ta">🇮🇳 தமிழ்</option>
    <option value="hi">🇮🇳 हिन्दी</option>
    <option value="bn">🇧🇩 বাংলা</option>
  </select>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-info">
    <span id="stepLabel">Step 1 of 20</span>
    <span id="stepPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main>
  <div class="wizard" id="wizard"></div>
</main>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">Generating your resume...</div>
</div>

<script>
// ============================================================
// STEP DEFINITIONS (language-independent)
// ============================================================
const STEPS = [
  { key: "agency",      type: "text",   validate: null,     optional: false },
  { key: "passportPhoto", type: "photo", optional: false },  // NEW
  { key: "name",        type: "text",   validate: null,     optional: false },
  { key: "dob",         type: "text",   validate: "dob",    optional: false },
  { key: "nationality", type: "text",   validate: null,     optional: false },
  { key: "passportNumber", type: "text", validate: null,   optional: false },  // NEW
  { key: "country",     type: "text",   validate: null,     optional: false },
  { key: "city",        type: "text",   validate: null,     optional: false },
  { key: "phone",       type: "text",   validate: "phone",  optional: false },
  { key: "email",       type: "text",   validate: "email",  optional: false },
  { key: "jobType",     type: "multi",  optional: false },
  { key: "workArrange", type: "opts",   optional: false },
  { key: "availability",type: "opts",   optional: false },
  { key: "salary",      type: "text",   validate: "salary", optional: true },
  { key: "experience",  type: "opts",   optional: false },
  { key: "job1Title",   type: "text",   validate: null,     optional: false },
  { key: "job1Company", type: "text",   validate: null,     optional: false },
  { key: "job1Dates",   type: "text",   validate: "daterange", optional: false },
  { key: "job2Title",   type: "text",   validate: null,     optional: true },
  { key: "job2Company", type: "text",   validate: null,     optional: true },
  { key: "job2Dates",   type: "text",   validate: "daterange", optional: true },
  { key: "job3Title",   type: "text",   validate: null,     optional: true },
  { key: "job3Company", type: "text",   validate: null,     optional: true },
  { key: "job3Dates",   type: "text",   validate: "daterange", optional: true },
  { key: "skills",      type: "text",   validate: null,     optional: false },
  { key: "certs",       type: "text",   validate: null,     optional: true },
  { key: "education",   type: "opts",   optional: false },
  { key: "languages",   type: "multi",  optional: false },
];

// ============================================================
// TRANSLATIONS (only English shown for brevity – you need to add passportNumber and photo step to each language)
// ============================================================
const CONTENT = {
  en: {
    back: "← Back",
    next: "Continue →",
    submit: "Submit Resume ✓",
    submitting: "Submitting your resume...",
    editHint: "Tap any field to edit it",
    reviewTitle: "Review Your Resume",
    reviewHint: "Check everything carefully before submitting.",
    naBtn: "Not applicable / Skip",
    doneBtn: "Done — next step →",
    stepOf: (a,b) => `Step ${a} of ${b}`,
    steps: [
      { icon: "🏬", label: "Agency", question: "Which manpower agency is this resume for?", hint: "Type the agency name exactly as given to you.", placeholder: "e.g. Worklink Manpower Pte Ltd" },
      // New photo step
      { icon: "📷", label: "Passport", question: "Scan your passport", hint: "Upload a photo of your passport data page (the page with your picture). We'll automatically fill in your details.", placeholder: "" },
      { icon: "👤", label: "Full name", question: "What is your full name?", hint: "Enter your full legal name.", placeholder: "e.g. Ahmad bin Ramli" },
      { icon: "🎂", label: "Date of birth", question: "What is your date of birth?", hint: "Example: 15 Jan 1990 or 15/01/1990", placeholder: "e.g. 15 Jan 1990" },
      { icon: "🌏", label: "Nationality", question: "What is your nationality?", hint: "Example: Malaysian, Indian, Bangladeshi, Filipino", placeholder: "e.g. Malaysian" },
      { icon: "🛂", label: "Passport number", question: "What is your passport number?", hint: "Found on the photo page of your passport.", placeholder: "e.g. A12345678" },
      { icon: "📍", label: "Country", question: "Which country are you currently living in?", hint: "", placeholder: "e.g. Malaysia" },
      { icon: "🏙", label: "City", question: "Which city or town are you in?", hint: "", placeholder: "e.g. Kuala Lumpur" },
      { icon: "📞", label: "Phone", question: "What is your phone number?", hint: "Include your country code. Example: +60 12-345 6789", placeholder: "e.g. +60 12-345 6789" },
      { icon: "📧", label: "Email", question: "What is your email address?", hint: "Example: ahmad@gmail.com", placeholder: "e.g. ahmad@gmail.com" },
      { icon: "💼", label: "Job type", question: "What type of work are you looking for in Singapore?", hint: "Select all that apply.", options: ["Construction","Cleaning","Delivery / Logistics","Security","Warehouse","F&B / Kitchen","Manufacturing","Other"] },
      { icon: "🕐", label: "Arrangement", question: "What type of work arrangement are you open to?", hint: "", options: ["Full-time","Part-time","Shift work"] },
      { icon: "📅", label: "Availability", question: "When can you start work in Singapore?", hint: "", options: ["Immediately","Within 1 week","Within 1 month"] },
      { icon: "💰", label: "Salary (SGD)", question: "What is your expected monthly salary in Singapore?", hint: "In Singapore Dollars. Leave blank if flexible.", placeholder: "e.g. 1800" },
      { icon: "📊", label: "Experience", question: "How many years of experience do you have?", hint: "In this type of work.", options: ["No experience","< 1 year","1–3 years","3–5 years","5–10 years","10+ years"] },
      { icon: "🏢", label: "Job 1 title", question: "What was your most recent job title?", hint: "Example: Construction Worker, Security Guard, Cleaner", placeholder: "e.g. Construction Worker" },
      { icon: "🏢", label: "Job 1 company", question: "Which company did you work at?", hint: "", placeholder: "e.g. Lim Construction Pte Ltd" },
      { icon: "🏢", label: "Job 1 dates", question: "When did you work there?", hint: "Example: Jan 2022 – Mar 2024", placeholder: "e.g. Jan 2022 – Mar 2024" },
      { icon: "🏢", label: "Job 2 title", question: "What was your 2nd most recent job title?", hint: "Leave blank if you only have one job.", placeholder: "e.g. Warehouse Worker" },
      { icon: "🏢", label: "Job 2 company", question: "Which company was that?", hint: "", placeholder: "e.g. ABC Logistics" },
      { icon: "🏢", label: "Job 2 dates", question: "When did you work there?", hint: "Example: Mar 2020 – Dec 2021", placeholder: "e.g. Mar 2020 – Dec 2021" },
      { icon: "🏢", label: "Job 3 title", question: "What was your 3rd most recent job title?", hint: "Leave blank if you only have two jobs.", placeholder: "e.g. Cleaner" },
      { icon: "🏢", label: "Job 3 company", question: "Which company was that?", hint: "", placeholder: "e.g. XYZ Services" },
      { icon: "🏢", label: "Job 3 dates", question: "When did you work there?", hint: "Example: Jan 2018 – Feb 2020", placeholder: "e.g. Jan 2018 – Feb 2020" },
      { icon: "🔧", label: "Skills", question: "What skills and tools do you know?", hint: "Example: Forklift, scaffolding, welding, cleaning equipment, driving", placeholder: "e.g. Forklift, scaffolding, welding" },
      { icon: "📜", label: "Certifications", question: "Do you have any certifications or licences?", hint: "Example: Forklift licence, BCSS, Food Hygiene cert, Security licence", placeholder: "e.g. Forklift licence, BCSS" },
      { icon: "🎓", label: "Education", question: "What is your highest education level?", hint: "", options: ["No formal education","Primary school","Secondary school","Vocational / ITE","Diploma","Degree or higher"] },
      { icon: "🗣", label: "Languages", question: "Which languages can you speak or read?", hint: "Select all that apply.", options: ["English","Mandarin","Malay","Tamil","Hindi","Bengali"] },
    ],
    reviewSections: {
      personal: "Personal Details",
      job: "Job Preferences",
      experience: "Work Experience",
      skills: "Skills & Education",
    },
    errors: {
      required: "This field is required.",
      dob: "Please enter a valid date. Example: 15 Jan 1990",
      phone: "Please enter a valid phone number with country code.",
      email: "Please enter a valid email address.",
      salary: "Please enter a number, e.g. 1800",
      daterange: "Please enter dates, e.g. Jan 2022 – Mar 2024",
    },
    successTitle: (name) => `Thank you, ${name}! 🎉`,
    successMsg: (agency) => `Your resume has been successfully submitted to ${agency}. They will review your details and contact you if there is a suitable position.\n\nGood luck! 🙏`,
  },
  // ... (add your other languages here, replicating the new photo step and passportNumber field in each)
};

// ============================================================
// GLOBALS
// ============================================================
let lang = "en";
let currentStep = 0;
let data = {};
let editingKey = null;

// ============================================================
// HELPERS
// ============================================================
function t(key, ...args) {
  const L = CONTENT[lang] || CONTENT.en;
  const v = L[key];
  if (typeof v === "function") return v(...args);
  return v || CONTENT.en[key];
}

function getCurrentStepContent() {
  const content = CONTENT[lang] || CONTENT.en;
  return content.steps[currentStep] || null;
}

function getTotalSteps() {
  return STEPS.length;
}

// ============================================================
// VALIDATION (same as before)
// ============================================================
function validateField(type, value) {
  if (!value || !value.trim()) return null;
  const errors = t("errors") || CONTENT.en.errors;
  
  switch(type) {
    case "dob": {
      const ok = /^\d{1,2}[\s\/\-][A-Za-z\d]{1,9}[\s\/\-]\d{4}$/.test(value.trim()) || /^\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2}$/.test(value.trim());
      if (!ok) return errors.dob;
      const yr = value.match(/\d{4}/);
      if (yr) { const y=parseInt(yr[0]); if(y<1920||y>new Date().getFullYear()-10) return errors.dob; }
      return null;
    }
    case "phone": { 
      const d=value.replace(/\D/g,""); 
      return (d.length<7||d.length>15)?errors.phone:null; 
    }
    case "email": return !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)?errors.email:null;
    case "salary": return !/\d/.test(value)?errors.salary:null;
    case "daterange": return (/present|current|now/i.test(value)||/\d{4}/.test(value))?null:errors.daterange;
    default: return null;
  }
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function render() {
  const totalSteps = getTotalSteps();
  const isReview = currentStep >= totalSteps;
  
  const pct = Math.round((currentStep / (totalSteps + 1)) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("stepPct").textContent = pct + "%";
  document.getElementById("stepLabel").textContent = isReview ? t("reviewTitle") : t("stepOf", currentStep + 1, totalSteps);
  document.getElementById("progressWrap").style.display = isReview ? "none" : "";
  
  if (isReview) {
    renderReview();
    return;
  }
  
  const stepDef = STEPS[currentStep];
  const content = getCurrentStepContent();
  const val = data[stepDef.key] || "";
  
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  
  const card = document.createElement("div");
  card.className = "step-card active";
  
  let inner = `
    <div class="step-icon">${content.icon}</div>
    <div class="step-label">${content.label}</div>
    <div class="step-q">${content.question}</div>
    ${content.hint ? `<div class="step-hint">${content.hint}</div>` : ""}
  `;
  
  if (stepDef.type === "text") {
    inner += `
      <input class="field" id="mainField" type="text" placeholder="${content.placeholder || ""}" value="${escHtml(val)}" />
      <div class="field-error" id="fieldErr"></div>
    `;
    if (stepDef.optional) {
      inner += `<div style="margin-top:10px;"><button class="opt-btn" style="width:100%;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button></div>`;
    }
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (stepDef.type === "opts") {
    const options = content.options || [];
    const cols = options.length <= 3 ? "single" : "";
    inner += `<div class="opts-grid ${cols}" id="optsGrid">`;
    options.forEach(o => {
      const sel = val === o ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="selectOpt(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    if (stepDef.optional) inner += `<button class="opt-btn" style="width:100%;margin-top:10px;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" id="nextBtn" ${!val ? 'disabled' : ''} onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (stepDef.type === "multi") {
    const options = content.options || [];
    const selected = val ? val.split(", ").filter(Boolean) : [];
    inner += `<div class="opts-grid" id="optsGrid">`;
    options.forEach(o => {
      const sel = selected.includes(o) ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="toggleMulti(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    inner += `<button class="multi-done ${selected.length > 0 ? 'show' : ''}" id="doneBtn" onclick="goNext()">${t("doneBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
    </div>`;
  } else if (stepDef.type === "photo") {
    inner += `
      <input type="file" id="passportFile" class="file-input" accept="image/*" capture="environment" />
      <div id="preview" style="margin-top: 10px;"></div>
      <button id="scanBtn" class="opt-btn" style="width:100%; margin-top:12px;">📷 Scan Passport</button>
      <div id="ocrLoading" class="ocr-loading" style="display:none;">
        <div class="spinner-small"></div>
        <span>Processing image...</span>
      </div>
      <div class="nav">
        ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
        <button id="skipOcrBtn" class="btn-next" onclick="skipOcr()">Skip (Enter manually)</button>
      </div>
    `;
  }
  
  card.innerHTML = inner;
  wizard.appendChild(card);
  
  // Attach photo step event listeners if needed
  if (stepDef.type === "photo") {
    const fileInput = document.getElementById("passportFile");
    const preview = document.getElementById("preview");
    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          preview.innerHTML = `<img src="${ev.target.result}" class="preview-img" />`;
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = "";
      }
    });
    document.getElementById("scanBtn").addEventListener("click", handleScan);
  }
  
  if (stepDef.type === "text") {
    setTimeout(() => document.getElementById("mainField")?.focus(), 100);
    document.getElementById("mainField")?.addEventListener("keydown", e => { if(e.key === "Enter") goNext(); });
  }
}

function renderReview() {
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  
  const sections = [
    { title: t("reviewSections").personal, keys: ["agency","name","dob","nationality","passportNumber","country","city","phone","email"] },
    { title: t("reviewSections").job,      keys: ["jobType","workArrange","availability","salary","experience"] },
    { title: t("reviewSections").experience, keys: ["job1Title","job1Company","job1Dates","job2Title","job2Company","job2Dates","job3Title","job3Company","job3Dates"] },
    { title: t("reviewSections").skills,   keys: ["skills","certs","education","languages"] },
  ];
  
  let html = `
    <div class="step-icon">📋</div>
    <div class="step-q">${t("reviewTitle")}</div>
    <div class="step-hint">${t("reviewHint")} ${t("editHint")}</div>
  `;
  
  sections.forEach(sec => {
    let rows = "";
    sec.keys.forEach(k => {
      const stepIndex = STEPS.findIndex(s => s.key === k);
      if (stepIndex === -1) return;
      const stepDef = STEPS[stepIndex];
      const content = (CONTENT[lang] || CONTENT.en).steps[stepIndex];
      if (!content) return;
      const v = data[k];
      if (!v && stepDef.optional) return;
      rows += `<div class="review-row" onclick="editField('${k}')">
        <span class="review-ic">${content.icon}</span>
        <span class="review-lb">${content.label}</span>
        <span class="review-val">${escHtml(v || "—")}</span>
        <span class="review-edit">Edit</span>
      </div>`;
    });
    if (!rows.trim()) return;
    html += `<div class="review-section">
      <div class="review-section-title">${sec.title}</div>
      ${rows}
    </div>`;
  });
  
  html += `<button class="btn-submit" onclick="submitResume()">${t("submit")}</button>`;
  html += `<div class="nav"><button class="btn-back" onclick="goBack()">${t("back")}</button></div>`;
  
  card.innerHTML = html;
  wizard.appendChild(card);
}

// ============================================================
// OCR HANDLER
// ============================================================
async function handleScan() {
  const fileInput = document.getElementById("passportFile");
  const file = fileInput.files[0];
  if (!file) {
    alert("Please select a photo first.");
    return;
  }

  const scanBtn = document.getElementById("scanBtn");
  const ocrLoading = document.getElementById("ocrLoading");
  scanBtn.disabled = true;
  ocrLoading.style.display = "flex";

  const formData = new FormData();
  formData.append("image", file);

  try {
    const res = await fetch("/ocr-passport", {
      method: "POST",
      body: formData,
    });
    const json = await res.json();
    if (json.ok) {
      // Pre-fill data
      if (json.data.name) data.name = json.data.name;
      if (json.data.dob) data.dob = json.data.dob;
      if (json.data.nationality) data.nationality = json.data.nationality;
      if (json.data.passportNumber) data.passportNumber = json.data.passportNumber;
      if (json.photoUrl) data.passportPhotoUrl = json.photoUrl; 

      // Move to next step (the fields will be shown pre-filled)
      advance();
    } else {
      alert("OCR failed: " + (json.error || "Unknown error"));
      scanBtn.disabled = false;
    }
  } catch (err) {
    console.error(err);
    alert("Network error. Please try again or skip.");
    scanBtn.disabled = false;
  } finally {
    ocrLoading.style.display = "none";
  }
}

function skipOcr() {
  // Skip photo step without OCR
  advance();
}

// ============================================================
// NAVIGATION (same as before)
// ============================================================
function selectOpt(btn, val) {
  btn.closest(".opts-grid").querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  const stepDef = STEPS[currentStep];
  data[stepDef.key] = val;
  const nb = document.getElementById("nextBtn");
  if (nb) nb.disabled = false;
}

function toggleMulti(btn, val) {
  btn.classList.toggle("selected");
  const stepDef = STEPS[currentStep];
  const selected = Array.from(btn.closest(".opts-grid").querySelectorAll(".opt-btn.selected")).map(b => b.textContent.trim());
  data[stepDef.key] = selected.join(", ");
  const db = document.getElementById("doneBtn");
  if (db) { db.classList.toggle("show", selected.length > 0); }
}

function skipField() {
  const stepDef = STEPS[currentStep];
  data[stepDef.key] = "";
  advance();
}

function goNext() {
  const stepDef = STEPS[currentStep];
  const errors = t("errors") || CONTENT.en.errors;
  
  if (stepDef.type === "text") {
    const field = document.getElementById("mainField");
    const val = field?.value.trim() || "";
    const errEl = document.getElementById("fieldErr");
    
    if (!val && !stepDef.optional) { 
      showErr(errEl, errors.required); 
      return; 
    }
    if (val && stepDef.validate) {
      const err = validateField(stepDef.validate, val);
      if (err) { showErr(errEl, err); return; }
    }
    data[stepDef.key] = val;
  } else if (stepDef.type === "multi") {
    if (!data[stepDef.key] || !data[stepDef.key].trim()) return;
  } else if (stepDef.type === "opts") {
    if (!data[stepDef.key]) return;
  } else if (stepDef.type === "photo") {
    // If we got here via skipOcr, we already advanced; but if next is clicked, we skip anyway
    advance();
    return;
  }
  
  if (editingKey) { 
    editingKey = null; 
    currentStep = getTotalSteps(); 
    render(); 
    return; 
  }
  advance();
}

function advance() {
  currentStep++;
  // Skip optional job2/job3 fields if title is blank
  while (currentStep < getTotalSteps()) {
    const stepDef = STEPS[currentStep];
    if (stepDef.key === "job2Company" || stepDef.key === "job2Dates") {
      if (!data["job2Title"]) { currentStep++; continue; }
    }
    if (stepDef.key === "job3Title" && !data["job2Title"]) { currentStep++; continue; }
    if (stepDef.key === "job3Company" || stepDef.key === "job3Dates") {
      if (!data["job3Title"]) { currentStep++; continue; }
    }
    break;
  }
  render();
  window.scrollTo(0,0);
}

function goBack() {
  if (editingKey) { 
    editingKey = null; 
    currentStep = getTotalSteps(); 
    render(); 
    return; 
  }
  if (currentStep > 0) { 
    currentStep--; 
    render(); 
    window.scrollTo(0,0); 
  }
}

function editField(key) {
  const idx = STEPS.findIndex(s => s.key === key);
  if (idx < 0) return;
  editingKey = key;
  currentStep = idx;
  render();
  window.scrollTo(0,0);
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add("show");
  document.querySelector(".field")?.classList.add("error");
}

function changeLang(l) {
  lang = l;
  render();
}

// ============================================================
// SUBMIT (unchanged)
// ============================================================
async function submitResume() {
  const btn = document.querySelector(".btn-submit");
  if (btn) btn.disabled = true;
  
  const loadingEl = document.getElementById("loading");
  const loadingMsg = document.getElementById("loadingMsg");
  loadingMsg.textContent = t("submitting");
  loadingEl.classList.add("show");
  
  try {
    const res = await fetch("/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data, lang }),
    });
    const json = await res.json();
    loadingEl.classList.remove("show");
    if (json.ok) {
      showSuccess();
    } else {
      alert("Submission failed: " + (json.error || "Unknown error"));
      if (btn) btn.disabled = false;
    }
  } catch(err) {
    loadingEl.classList.remove("show");
    alert("Network error. Please try again.");
    if (btn) btn.disabled = false;
  }
}

function showSuccess() {
  document.getElementById("progressWrap").style.display = "none";
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  card.innerHTML = `
    <div class="success-screen">
      <span class="success-icon">🎉</span>
      <div class="success-title">${t("successTitle", data.name?.split(" ")[0] || "")}</div>
      <div class="success-msg">${t("successMsg", data.agency || "the agency").replace(/\n/g,"<br>")}</div>
    </div>
  `;
  wizard.appendChild(card);
}

function escHtml(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// INIT
// ============================================================
document.getElementById("langSel").addEventListener("change", (e) => changeLang(e.target.value));
render();
</script>
</body>
</html>
