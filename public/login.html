<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — JobReady</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>

:root {
  --bg:         #ffffff;
  --bg-alt:     #f5f2ec;
  --ink:        #0d1b27;
  --muted:      #7a8a96;
  --brand:      #c85e38;
  --brand-dark: #a34526;
  --line:       rgba(13, 27, 39, 0.08);
  --radius:     20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: "Plus Jakarta Sans", sans-serif; color: var(--ink); background: var(--bg-alt); min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }

.nav { background: #fff; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; height: 68px; padding: 0 max(24px, calc((100% - 1120px) / 2)); }
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-mark { width: 40px; height: 40px; border-radius: 12px; background: var(--brand); color: #fff; font-size: 14px; font-weight: 800; display: grid; place-items: center; flex-shrink: 0; }
.nav-name { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; }
.nav-register { font-size: 14px; font-weight: 600; color: var(--muted); }
.nav-register:hover { color: var(--ink); }

main { flex: 1; display: flex; align-items: center; padding: 48px 24px; }
.shell { width: min(480px, 100%); margin: 0 auto; }
.card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 36px 40px; }

.card-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); margin-bottom: 10px; }
.card h1 { font-family: "Fraunces", serif; font-size: 30px; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 8px; }
.card-sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.divider span { font-size: 12px; color: var(--muted); font-weight: 600; }

.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; height: 48px; border-radius: 999px;
  border: 1.5px solid var(--line); background: #fff; color: var(--ink);
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.btn-google:hover { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(200,94,56,0.10); }
.btn-google svg { flex-shrink: 0; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.form-group input {
  width: 100%; height: 48px; padding: 0 16px;
  border: 1.5px solid var(--line); border-radius: 12px;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; color: var(--ink);
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.form-group input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(200,94,56,0.10); }

.btn-submit {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 52px; border-radius: 999px;
  background: var(--brand); color: #fff;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 15px; font-weight: 700;
  border: none; cursor: pointer; margin-top: 8px;
  transition: background 0.15s;
}
.btn-submit:hover { background: var(--brand-dark); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.msg { font-size: 13px; padding: 12px 14px; border-radius: 10px; margin-top: 14px; }
.msg.error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
.msg.success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }

.card-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
.card-footer a { color: var(--brand); font-weight: 700; }

</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <span class="nav-mark">JR</span>
      <span class="nav-name">JobReady</span>
    </a>
    <a class="nav-register" href="/register">Create account</a>
  </div>
</nav>

<main>
  <div class="shell">
    <div class="card">
      <div class="card-eyebrow">Agency Portal</div>
      <h1>Welcome back</h1>
      <p class="card-sub">Sign in to view submissions and manage your partner links.</p>

      <button class="btn-google" id="googleBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2a10.34 10.34 0 0 0-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.02-3.7H.96v2.34A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.98 10.72A5.41 5.41 0 0 1 3.7 9c0-.6.1-1.18.28-1.72V4.94H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.06l3.02-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.34l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.94L3.98 7.28C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>

      <div class="divider"><span>or use email</span></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@agency.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <div id="loginMsg"></div>
        <button type="submit" class="btn-submit" id="loginBtn">Sign in</button>
      </form>

      <div class="card-footer">No account yet? <a href="/register">Register your agency</a></div>
    </div>
  </div>
</main>

<script>
(function () {
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // Redirect if already signed in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.replace("/dashboard");
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + "/dashboard" },
    });
    if (error) showMsg(error.message, "error");
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("password").value;
    const btn   = document.getElementById("loginBtn");

    btn.disabled = true; btn.textContent = "Signing in…";

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      btn.disabled = false; btn.textContent = "Sign in";
      return showMsg(error.message, "error");
    }

    window.location.replace("/dashboard");
  });

  function showMsg(text, type) {
    document.getElementById("loginMsg").innerHTML = `<div class="msg ${type}">${text}</div>`;
  }
})();
</script>
</body>
</html>
