<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — JobReady</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg:         #ffffff;
  --bg-alt:     #f5f2ec;
  --ink:        #0d1b27;
  --muted:      #7a8a96;
  --brand:      #c85e38;
  --brand-dark: #a34526;
  --line:       rgba(13, 27, 39, 0.08);
  --radius:     20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Plus Jakarta Sans", sans-serif; color: var(--ink); background: var(--bg-alt); min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }

.nav { background: #fff; border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; height: 68px; padding: 0 max(24px, calc((100% - 1120px) / 2)); }
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-mark { width: 40px; height: 40px; border-radius: 12px; background: var(--brand); color: #fff; font-size: 14px; font-weight: 800; display: grid; place-items: center; flex-shrink: 0; }
.nav-name { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; }

main { flex: 1; display: flex; align-items: center; padding: 48px 24px; }
.shell { width: min(480px, 100%); margin: 0 auto; }
.card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 36px 40px; }

.card-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); margin-bottom: 10px; }
.card h1 { font-family: "Fraunces", serif; font-size: 30px; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 8px; }
.card-sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.form-group input {
  width: 100%; height: 48px; padding: 0 16px;
  border: 1.5px solid var(--line); border-radius: 12px;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; color: var(--ink);
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.form-group input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(200,94,56,0.10); }

.btn-submit {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 52px; border-radius: 999px;
  background: var(--brand); color: #fff;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 15px; font-weight: 700;
  border: none; cursor: pointer; margin-top: 8px;
  transition: background 0.15s;
}
.btn-submit:hover { background: var(--brand-dark); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.msg { font-size: 13px; padding: 12px 14px; border-radius: 10px; margin-top: 14px; }
.msg.error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
.msg.success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }

.card-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
.card-footer a { color: var(--brand); font-weight: 700; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <span class="nav-mark">JR</span>
      <span class="nav-name">JobReady</span>
    </a>
  </div>
</nav>

<main>
  <div class="shell">
    <div class="card" id="requestCard">
      <div class="card-eyebrow">Agency Portal</div>
      <h1>Reset your password</h1>
      <p class="card-sub">Enter your email and we'll send you a link to set a new password.</p>
      <form id="requestForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@agency.com" required autocomplete="email">
        </div>
        <div id="requestMsg"></div>
        <button type="submit" class="btn-submit" id="requestBtn">Send reset link</button>
      </form>
      <div class="card-footer"><a href="/login">Back to sign in</a></div>
    </div>

    <div class="card" id="updateCard" style="display:none;">
      <div class="card-eyebrow">Agency Portal</div>
      <h1>Set new password</h1>
      <p class="card-sub">Choose a strong password for your agency account.</p>
      <form id="updateForm">
        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="At least 8 characters" required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your new password" required autocomplete="new-password" minlength="8">
        </div>
        <div id="updateMsg"></div>
        <button type="submit" class="btn-submit" id="updateBtn">Update password</button>
      </form>
    </div>
  </div>
</main>

<script>
(function () {
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // Supabase puts the recovery tokens in the URL hash after redirect
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const isRecovery = hash.get("type") === "recovery";

  if (isRecovery) {
    document.getElementById("requestCard").style.display = "none";
    document.getElementById("updateCard").style.display = "";
  }

  // ── Request reset link ────────────────────────────────────────────────────
  document.getElementById("requestForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const btn = document.getElementById("requestBtn");
    btn.disabled = true;
    btn.textContent = "Sending…";

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/password-reset",
    });

    if (error) {
      btn.disabled = false;
      btn.textContent = "Send reset link";
      showMsg("requestMsg", error.message, "error");
      return;
    }

    showMsg("requestMsg", "Check your inbox — we've sent a reset link.", "success");
    btn.textContent = "Email sent";
  });

  // ── Set new password ──────────────────────────────────────────────────────
  document.getElementById("updateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const newPw   = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn     = document.getElementById("updateBtn");

    if (newPw !== confirm) {
      showMsg("updateMsg", "Passwords don't match.", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Updating…";

    const { error } = await sb.auth.updateUser({ password: newPw });
    if (error) {
      btn.disabled = false;
      btn.textContent = "Update password";
      showMsg("updateMsg", error.message, "error");
      return;
    }

    showMsg("updateMsg", "Password updated! Redirecting to sign in…", "success");
    setTimeout(() => window.location.replace("/login"), 2000);
  });

  function showMsg(id, text, type) {
    document.getElementById(id).innerHTML = `<div class="msg ${type}">${text}</div>`;
  }
})();
</script>
</body>
</html>
