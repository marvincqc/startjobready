<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — JobReady</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>

:root {
  --bg:         #ffffff;
  --bg-alt:     #f5f2ec;
  --ink:        #0d1b27;
  --muted:      #7a8a96;
  --brand:      #c85e38;
  --brand-dark: #a34526;
  --line:       rgba(13, 27, 39, 0.08);
  --radius:     16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: "Plus Jakarta Sans", sans-serif; color: var(--ink); background: var(--bg-alt); min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }

/* ── NAV ─────────────────────────────────────────────────────── */
.nav { background: #fff; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100; }
.shell { width: min(1120px, calc(100% - 48px)); margin: 0 auto; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; height: 64px; }
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-mark { width: 36px; height: 36px; border-radius: 10px; background: var(--brand); color: #fff; font-size: 13px; font-weight: 800; display: grid; place-items: center; flex-shrink: 0; }
.nav-name { font-size: 16px; font-weight: 800; letter-spacing: -0.03em; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.agency-name-badge { font-size: 13px; font-weight: 700; color: var(--muted); }
.btn-signout { font-size: 13px; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; padding: 0; }
.btn-signout:hover { color: var(--ink); }

/* ── PLAN CHIP & USAGE ────────────────────────────────────────── */
.plan-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 12px; border-radius: 999px;
  border: 1.5px solid var(--line); background: #fff;
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink); cursor: pointer; transition: all 0.15s;
}
.plan-chip:hover { border-color: var(--brand); color: var(--brand); }
.plan-chip.plan-pro { background: #fff0e3; border-color: rgba(200,94,56,0.35); color: var(--brand); }
.plan-chip.plan-scale { background: #0d1b27; border-color: #0d1b27; color: #fff; }
.plan-chip.plan-scale:hover { color: #fff0e3; border-color: var(--brand); }

.usage-card {
  background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
  padding: 18px 22px; margin-bottom: 24px; display: grid; gap: 14px;
}
.usage-row { display: grid; grid-template-columns: 140px 1fr auto; gap: 16px; align-items: center; }
.usage-label { font-size: 13px; font-weight: 700; color: var(--ink); }
.usage-bar { position: relative; height: 8px; border-radius: 999px; background: var(--bg-alt); overflow: hidden; }
.usage-bar-fill { position: absolute; inset: 0 auto 0 0; background: var(--brand); border-radius: 999px; transition: width 0.3s; }
.usage-bar.warn .usage-bar-fill { background: #d69e2e; }
.usage-bar.danger .usage-bar-fill { background: #c53030; }
.usage-count { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.usage-count.danger { color: #c53030; }
.usage-upgrade {
  display: inline-flex; align-items: center; height: 32px; padding: 0 14px; border-radius: 999px;
  background: var(--brand); color: #fff; border: none; cursor: pointer;
  font-size: 12px; font-weight: 700; margin-left: 8px;
}
.usage-upgrade:hover { background: var(--brand-dark); }

@media (max-width: 600px) {
  .usage-row { grid-template-columns: 1fr; gap: 6px; }
  .usage-row .usage-count { justify-self: start; }
}

/* ── UPGRADE MODAL ────────────────────────────────────────────── */
.upgrade-overlay {
  position: fixed; inset: 0; background: rgba(13,27,39,0.5); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.upgrade-overlay.open { display: flex; }
.upgrade-modal {
  background: #fff; width: 100%; max-width: 760px; border-radius: 20px;
  padding: 28px; max-height: 92vh; overflow-y: auto;
}
.upgrade-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
.upgrade-title { font-family: "Fraunces", serif; font-size: 24px; letter-spacing: -0.03em; }
.upgrade-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
.upgrade-close { width: 32px; height: 32px; border-radius: 999px; border: 1.5px solid var(--line); background: #fff; cursor: pointer; font-size: 16px; }
.tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.tier { border: 1.5px solid var(--line); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
.tier.current { border-color: var(--ink); background: var(--bg-alt); }
.tier-name { font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.tier-price { font-family: "Fraunces", serif; font-size: 26px; letter-spacing: -0.03em; }
.tier-price small { font-size: 12px; color: var(--muted); font-weight: 600; font-family: inherit; }
.tier-features { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; font-size: 13px; color: var(--ink); }
.tier-features li::before { content: "✓ "; color: var(--brand); font-weight: 800; }
.tier-cta {
  display: inline-flex; align-items: center; justify-content: center;
  height: 40px; border-radius: 999px; padding: 0 16px;
  background: var(--brand); color: #fff; font-size: 13px; font-weight: 700;
  text-decoration: none; border: none; cursor: pointer; margin-top: auto;
}
.tier-cta:hover { background: var(--brand-dark); }
.tier-cta.disabled { background: var(--bg-alt); color: var(--muted); cursor: default; pointer-events: none; }

@media (max-width: 720px) {
  .tiers { grid-template-columns: 1fr; }
}

/* ── PAGE LAYOUT ─────────────────────────────────────────────── */
.page { flex: 1; padding: 32px 0 64px; }

/* ── TABS ────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 4px; width: fit-content; margin-bottom: 24px; }
.tab { padding: 8px 20px; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; background: none; color: var(--muted); transition: all 0.15s; }
.tab.active { background: var(--ink); color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SECTION HEADER ──────────────────────────────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.section-title { font-family: "Fraunces", serif; font-size: 26px; letter-spacing: -0.03em; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 7px;
  height: 42px; padding: 0 20px; border-radius: 999px;
  background: var(--brand); color: #fff;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; transition: background 0.15s;
}
.btn-primary:hover { background: var(--brand-dark); }

/* ── CARDS ───────────────────────────────────────────────────── */
.card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); }
.empty-state { padding: 40px 24px; text-align: center; color: var(--muted); font-size: 14px; }

/* ── LINKS TABLE ─────────────────────────────────────────────── */
.links-list { display: grid; gap: 10px; }
.link-row {
  display: flex; align-items: center; gap: 16px;
  background: #fff; border: 1px solid var(--line); border-radius: 14px;
  padding: 16px 20px; flex-wrap: wrap;
}
.link-info { flex: 1; min-width: 0; }
.link-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.link-meta { font-size: 12px; color: var(--muted); }
.link-url {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--bg-alt); font-size: 12px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
}
.copy-btn {
  flex-shrink: 0; height: 32px; padding: 0 12px; border-radius: 999px;
  border: 1.5px solid var(--line); background: #fff; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.copy-btn:hover { border-color: var(--brand); color: var(--brand); }
.copy-btn.copied { border-color: #48bb78; color: #276749; }
.status-badge {
  flex-shrink: 0; padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
}
.status-badge.active { background: #f0fff4; color: #276749; }
.status-badge.inactive { background: #fff5f5; color: #c53030; }
.toggle-btn {
  flex-shrink: 0; height: 32px; padding: 0 12px; border-radius: 999px;
  border: 1.5px solid var(--line); background: #fff; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.toggle-btn:hover { border-color: var(--ink); }

/* ── NEW LINK FORM ───────────────────────────────────────────── */
.new-link-form {
  background: #fff; border: 1.5px dashed var(--line); border-radius: var(--radius);
  padding: 24px; display: none; margin-bottom: 16px;
}
.new-link-form.open { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.form-group input, .form-group select {
  width: 100%; height: 44px; padding: 0 14px;
  border: 1.5px solid var(--line); border-radius: 10px;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; color: var(--ink);
  outline: none; background: var(--bg-alt); transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--brand); background: #fff; }
.form-actions { display: flex; gap: 10px; }
.btn-save { height: 40px; padding: 0 20px; border-radius: 999px; background: var(--brand); color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
.btn-cancel { height: 40px; padding: 0 16px; border-radius: 999px; border: 1.5px solid var(--line); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.form-msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 10px; }
.form-msg.error { background: #fff5f5; color: #c53030; }

/* ── SUBMISSIONS ─────────────────────────────────────────────── */
.submissions-list { display: grid; gap: 8px; }
.sub-row {
  display: flex; align-items: center; gap: 16px;
  background: #fff; border: 1px solid var(--line); border-radius: 14px;
  padding: 14px 20px; cursor: pointer; transition: border-color 0.15s;
}
.sub-row:hover { border-color: rgba(200,94,56,0.3); }
.sub-avatar {
  width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
  background: rgba(200,94,56,0.10); color: var(--brand);
  display: grid; place-items: center; font-size: 15px; font-weight: 800;
}
.sub-info { flex: 1; min-width: 0; }
.sub-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.sub-meta { font-size: 12px; color: var(--muted); }
.sub-tag { display: inline-flex; padding: 3px 8px; border-radius: 6px; background: var(--bg-alt); font-size: 11px; font-weight: 700; color: var(--muted); }
.sub-date { font-size: 12px; color: var(--muted); white-space: nowrap; }
.sub-attach { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

.load-more-btn {
  display: flex; align-items: center; justify-content: center;
  height: 44px; width: 100%; border-radius: 999px;
  border: 1.5px solid var(--line); background: #fff;
  font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer;
  margin-top: 12px; transition: border-color 0.15s, color 0.15s;
}
.load-more-btn:hover { border-color: var(--ink); color: var(--ink); }
.load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SUBMISSION DRAWER ───────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(13,27,39,0.4);
  z-index: 200; display: none; align-items: flex-end;
}
.drawer-overlay.open { display: flex; }
@media (min-width: 640px) { .drawer-overlay { align-items: center; justify-content: flex-end; } }
.drawer {
  background: #fff; width: 100%; max-width: 480px; max-height: 92vh;
  border-radius: 20px 20px 0 0; overflow-y: auto; padding: 28px;
}
@media (min-width: 640px) { .drawer { border-radius: 20px; height: 100vh; max-height: 100vh; border-radius: 0; } }
.drawer-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
.drawer-title { font-family: "Fraunces", serif; font-size: 22px; letter-spacing: -0.03em; }
.drawer-close { width: 32px; height: 32px; border-radius: 999px; border: 1.5px solid var(--line); background: #fff; cursor: pointer; font-size: 16px; display: grid; place-items: center; flex-shrink: 0; }
.drawer-section { margin-bottom: 20px; }
.drawer-label { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.drawer-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.drawer-field { background: var(--bg-alt); border-radius: 10px; padding: 10px 12px; }
.drawer-field-key { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
.drawer-field-val { font-size: 13px; font-weight: 700; }
.drawer-data { font-size: 12px; background: var(--bg-alt); border-radius: 10px; padding: 12px; overflow-x: auto; white-space: pre-wrap; line-height: 1.6; color: #32414f; max-height: 200px; overflow-y: auto; }
.btn-download {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; height: 48px; border-radius: 999px;
  background: var(--ink); color: #fff;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; margin-top: 4px; transition: background 0.15s;
  text-decoration: none;
}
.btn-download:hover { background: #1c3447; }
.btn-delete-sub {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; height: 40px; border-radius: 999px;
  background: transparent; color: #c53030;
  font-family: "Plus Jakarta Sans", sans-serif; font-size: 13px; font-weight: 700;
  border: 1.5px solid #fed7d7; cursor: pointer; margin-top: 8px; transition: background 0.15s, border-color 0.15s;
}
.btn-delete-sub:hover { background: #fff5f5; border-color: #fc8181; }

/* ── LOADING SPINNER ─────────────────────────────────────────── */
.spinner { width: 20px; height: 20px; border: 2.5px solid var(--line); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 32px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .link-url { max-width: 160px; }
  .nav-inner { padding: 0 20px; }
}

</style>
</head>
<body>

<nav class="nav">
  <div class="shell">
    <div class="nav-inner">
      <a class="nav-brand" href="/">
        <span class="nav-mark">JR</span>
        <span class="nav-name">JobReady</span>
      </a>
      <div class="nav-right">
        <span class="agency-name-badge" id="agencyBadge"></span>
        <button class="plan-chip" id="planChip" style="display:none;" type="button">Free</button>
        <button class="btn-signout" id="signOutBtn">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="shell">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="submissions">Submissions</button>
      <button class="tab" data-tab="links">Partner Links</button>
    </div>

    <!-- Usage card -->
    <div class="usage-card" id="usageCard" style="display:none;"></div>

    <!-- Submissions panel -->
    <div class="tab-panel active" id="panel-submissions">
      <div class="section-header">
        <h2 class="section-title">Submissions</h2>
      </div>
      <div id="submissionsContent"><div class="spinner"></div></div>
      <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load more</button>
    </div>

    <!-- Links panel -->
    <div class="tab-panel" id="panel-links">
      <div class="section-header">
        <h2 class="section-title">Partner Links</h2>
        <button class="btn-primary" id="newLinkBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New link
        </button>
      </div>
      <div class="new-link-form" id="newLinkForm">
        <div class="form-row">
          <div class="form-group">
            <label>Partner / Sending Agency Name</label>
            <input type="text" id="partnerName" placeholder="e.g. KL Staffing">
          </div>
          <div class="form-group">
            <label>Country</label>
            <input type="text" id="partnerCountry" placeholder="e.g. Malaysia">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Link code (your short identifier)</label>
            <input type="text" id="linkCode" placeholder="e.g. kl2025" maxlength="24">
          </div>
        </div>
        <div id="newLinkMsg"></div>
        <div class="form-actions">
          <button class="btn-save" id="saveLinkBtn">Create link</button>
          <button class="btn-cancel" id="cancelLinkBtn">Cancel</button>
        </div>
      </div>
      <div id="linksContent"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<!-- Upgrade modal -->
<div class="upgrade-overlay" id="upgradeOverlay">
  <div class="upgrade-modal" role="dialog" aria-modal="true">
    <div class="upgrade-head">
      <div>
        <div class="upgrade-title">Upgrade your plan</div>
        <div class="upgrade-sub" id="upgradeSub">Get more partner links and submissions.</div>
      </div>
      <button class="upgrade-close" id="upgradeClose" aria-label="Close">✕</button>
    </div>
    <div class="tiers" id="tiersGrid"></div>
    <p style="font-size:12px;color:var(--muted);margin-top:14px;">Plans renew monthly. Email <a href="mailto:upgrade@jobready.sg" style="color:var(--brand);font-weight:700;">upgrade@jobready.sg</a> with any questions.</p>
  </div>
</div>

<!-- Submission detail drawer -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title" id="drawerName">Loading…</div>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div id="drawerBody"></div>
  </div>
</div>

<script>
(function () {
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  let token = null;
  let agencySlug = null;
  let nextCursor = null;
  let loadingMore = false;
  let currentPlan = "free";
  let currentUsage = null;

  const PLAN_LABELS = { free: "Free", pro: "Pro", scale: "Scale" };
  const TIERS = [
    { key: "free",  name: "Free",  price: "S$0",   per: "forever",
      features: ["3 active partner links", "20 submissions / month", "PDF downloads", "Worker attachments"] },
    { key: "pro",   name: "Pro",   price: "S$29",  per: "per month",
      features: ["25 active partner links", "500 submissions / month", "PDF downloads", "Worker attachments"] },
    { key: "scale", name: "Scale", price: "S$129", per: "per month",
      features: ["Unlimited partner links", "Unlimited submissions", "PDF downloads", "Priority support"] },
  ];

  // ── Auth guard ──────────────────────────────────────────────────────────────
  // If there's a ?code= in the URL, Supabase is mid-PKCE-exchange — don't
  // redirect to /login on the first null-session fire; wait for SIGNED_IN.
  const hasPendingOAuth = new URLSearchParams(window.location.search).has("code");
  let booted = false;
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === "SIGNED_OUT") { window.location.replace("/login"); return; }
    if (session) token = session.access_token; // always keep token fresh
    if (booted) return;
    if (!session) {
      if (hasPendingOAuth) return; // exchange in progress, wait
      window.location.replace("/login");
      return;
    }
    booted = true;
    await loadAgencyAndData();
  });

  // Show a hint if loading takes more than 2s
  setTimeout(() => {
    if (booted) return;
    const el = document.getElementById("submissionsContent");
    if (el) el.innerHTML = `<div class="spinner"></div><p style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px;">Taking a moment — hang tight…</p>`;
  }, 2000);

  // Fallback: if onAuthStateChange never fires (no hash, no stored session)
  setTimeout(async () => {
    if (booted) return;
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace("/login"); return; }
    booted = true;
    token = session.access_token;
    await loadAgencyAndData();
  }, 3000);

  async function loadAgencyAndData() {
    try {
      const meRes = await fetch("/api/agency/me", { headers: auth() });
      if (meRes.status === 401) {
        await sb.auth.signOut({ scope: "local" }).catch(() => {});
        return window.location.replace("/login");
      }
      const meJson = await meRes.json();

      if (!meJson.agency) {
        return window.location.replace("/register?step=profile");
      }

      agencySlug = meJson.agency.slug;
      document.getElementById("agencyBadge").textContent = meJson.agency.name;
      document.title = `${meJson.agency.name} — JobReady`;

      currentPlan = meJson.usage?.plan || meJson.agency.plan || "free";
      currentUsage = meJson.usage || null;
      renderPlanChip();
      renderUsage();

      loadSubmissions();
      loadLinks();
    } catch (err) {
      document.getElementById("submissionsContent").innerHTML =
        `<p style="color:#c53030;font-size:14px;">Failed to load dashboard. Please refresh the page.</p>`;
      console.error("loadAgencyAndData error:", err);
    }
  }

  function init() {} // kept for compatibility

  function auth() { return { Authorization: "Bearer " + token }; }

  // ── Plan / usage rendering ─────────────────────────────────────────────────
  function renderPlanChip() {
    const chip = document.getElementById("planChip");
    if (!chip) return;
    chip.textContent = PLAN_LABELS[currentPlan] || "Free";
    chip.classList.remove("plan-pro", "plan-scale");
    if (currentPlan === "pro") chip.classList.add("plan-pro");
    if (currentPlan === "scale") chip.classList.add("plan-scale");
    chip.style.display = "inline-flex";
  }

  function renderUsage() {
    const card = document.getElementById("usageCard");
    if (!card || !currentUsage) return;
    if (currentPlan === "scale") { card.style.display = "none"; return; }

    const u = currentUsage;
    const subRow = buildUsageRow("Submissions", u.submissionsThisMonth, u.submissionsLimit, "this month");
    const linkRow = buildUsageRow("Partner links", u.activeLinks, u.activeLinksLimit, "active");
    card.innerHTML = subRow + linkRow;
    card.style.display = "grid";

    card.querySelectorAll("[data-upgrade]").forEach(btn => {
      btn.addEventListener("click", () => openUpgradeModal());
    });
  }

  function buildUsageRow(label, used, limit, suffix) {
    const limitTxt = (limit === null || limit === undefined || !isFinite(limit)) ? "∞" : limit;
    const pct = (limitTxt === "∞" || limit === 0) ? 0 : Math.min(100, Math.round((used / limit) * 100));
    let cls = "";
    if (pct >= 100) cls = " danger";
    else if (pct >= 80) cls = " warn";
    const atCap = isFinite(limit) && used >= limit;
    return `
      <div class="usage-row">
        <span class="usage-label">${esc(label)}</span>
        <div class="usage-bar${cls}"><div class="usage-bar-fill" style="width:${pct}%"></div></div>
        <span class="usage-count${pct >= 100 ? " danger" : ""}">
          ${used} / ${limitTxt} ${esc(suffix)}
          ${atCap ? `<button class="usage-upgrade" data-upgrade type="button">Upgrade</button>` : ""}
        </span>
      </div>
    `;
  }

  async function refreshUsage() {
    try {
      const res = await fetch("/api/agency/me", { headers: auth() });
      if (!res.ok) return;
      const j = await res.json();
      if (j.usage) {
        currentUsage = j.usage;
        currentPlan = j.usage.plan || currentPlan;
        renderPlanChip();
        renderUsage();
      }
    } catch (e) { /* ignore */ }
  }

  // ── Upgrade modal ──────────────────────────────────────────────────────────
  function openUpgradeModal() {
    const grid = document.getElementById("tiersGrid");
    grid.innerHTML = TIERS.map(t => {
      const isCurrent = t.key === currentPlan;
      const cta = isCurrent
        ? `<span class="tier-cta disabled">Current plan</span>`
        : (t.key === "free"
            ? `<span class="tier-cta disabled">—</span>`
            : `<a class="tier-cta" href="mailto:upgrade@jobready.sg?subject=${encodeURIComponent("Upgrade to " + t.name)}">Contact us</a>`);
      return `
        <div class="tier${isCurrent ? " current" : ""}">
          <div class="tier-name">${esc(t.name)}</div>
          <div class="tier-price">${esc(t.price)} <small>${esc(t.per)}</small></div>
          <ul class="tier-features">${t.features.map(f => `<li>${esc(f)}</li>`).join("")}</ul>
          ${cta}
        </div>
      `;
    }).join("");
    document.getElementById("upgradeOverlay").classList.add("open");
  }
  function closeUpgradeModal() {
    document.getElementById("upgradeOverlay").classList.remove("open");
  }
  document.getElementById("planChip").addEventListener("click", openUpgradeModal);
  document.getElementById("upgradeClose").addEventListener("click", closeUpgradeModal);
  document.getElementById("upgradeOverlay").addEventListener("click", (e) => {
    if (e.target.id === "upgradeOverlay") closeUpgradeModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeUpgradeModal();
  });

  // ── Tabs ────────────────────────────────────────────────────────────────────
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
    });
  });

  // ── Sign out ────────────────────────────────────────────────────────────────
  document.getElementById("signOutBtn").addEventListener("click", () => {
    sb.auth.signOut().catch(() => {}); // fire-and-forget; SIGNED_OUT event handles the redirect
  });

  // ── Submissions ─────────────────────────────────────────────────────────────
  async function loadSubmissions(cursor) {
    if (loadingMore) return;
    loadingMore = true;
    const btn = document.getElementById("loadMoreBtn");
    btn.disabled = true;

    try {
      const url = `/api/submissions?limit=20${cursor ? "&cursor=" + encodeURIComponent(cursor) : ""}`;
      const res = await fetch(url, { headers: auth() });
      const json = await res.json();

      if (!json.ok) {
        document.getElementById("submissionsContent").innerHTML = `<p style="color:#c53030;font-size:14px;">${esc(json.error)}</p>`;
        btn.disabled = false;
        loadingMore = false; return;
      }

      nextCursor = json.nextCursor;
      btn.style.display = nextCursor ? "flex" : "none";
      btn.disabled = false;

      const list = json.submissions;
      const container = document.getElementById("submissionsContent");

      if (!cursor && list.length === 0) {
        container.innerHTML = `<div class="card"><div class="empty-state">No submissions yet. Share your partner links to start receiving applications.</div></div>`;
        loadingMore = false; return;
      }

      if (!cursor) container.innerHTML = `<div class="submissions-list" id="subList"></div>`;
      const subList = document.getElementById("subList");
      list.forEach(s => subList.appendChild(buildSubRow(s)));
    } catch (err) {
      btn.disabled = false;
      console.error("loadSubmissions error:", err);
    } finally {
      loadingMore = false;
    }
  }

  document.getElementById("loadMoreBtn").addEventListener("click", () => {
    if (nextCursor) loadSubmissions(nextCursor);
  });

  function buildSubRow(s) {
    const div = document.createElement("div");
    div.className = "sub-row";
    div.dataset.id = s.id;
    const name = s.worker_name || "Unknown";
    const initials = name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
    const date = new Date(s.created_at).toLocaleDateString("en-SG", { day: "numeric", month: "short", year: "numeric" });
    div.innerHTML = `
      <div class="sub-avatar">${initials}</div>
      <div class="sub-info">
        <div class="sub-name">${esc(name)}</div>
        <div class="sub-meta">${esc(s.nationality || "—")} · ${esc(s.job_type || "—")}</div>
      </div>
      ${s.attachment_count > 0 ? `<div class="sub-attach"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 1h6l2 2v8H1V1h2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M3 6h6M3 8h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>${s.attachment_count}</div>` : ""}
      <div class="sub-date">${date}</div>
    `;
    div.addEventListener("click", () => openDrawer(s.id));
    return div;
  }

  // ── Drawer ──────────────────────────────────────────────────────────────────
  async function openDrawer(id) {
    const overlay = document.getElementById("drawerOverlay");
    const body = document.getElementById("drawerBody");
    document.getElementById("drawerName").textContent = "Loading…";
    body.innerHTML = `<div class="spinner"></div>`;
    overlay.classList.add("open");

    const res = await fetch(`/api/submissions/${id}`, { headers: auth() });
    const json = await res.json();
    if (!json.ok) { body.innerHTML = `<p style="color:#c53030;">${json.error}</p>`; return; }

    const s = json.submission;
    const name = s.worker_name || "Unknown";
    document.getElementById("drawerName").textContent = name;

    const date = new Date(s.created_at).toLocaleString("en-SG");
    const fields = [
      { k: "Nationality", v: s.nationality },
      { k: "Job type", v: s.job_type },
      { k: "Submitted", v: date },
      { k: "Attachments", v: s.attachment_count || 0 },
    ];

    const pdfUrl = s.pdf_path ? `/api/pdf/download?id=${encodeURIComponent(s.id)}&token=${encodeURIComponent(token)}` : null;

    body.innerHTML = `
      <div class="drawer-section">
        <div class="drawer-label">Details</div>
        <div class="drawer-fields">
          ${fields.map(f => `<div class="drawer-field"><div class="drawer-field-key">${f.k}</div><div class="drawer-field-val">${esc(String(f.v ?? "—"))}</div></div>`).join("")}
        </div>
      </div>
      ${s.data ? `
      <div class="drawer-section">
        <div class="drawer-label">Application data</div>
        <div class="drawer-data">${esc(JSON.stringify(s.data, null, 2))}</div>
      </div>` : ""}
      ${pdfUrl ? `
      <div class="drawer-section">
        <a class="btn-download" href="${pdfUrl}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download resume PDF
        </a>
      </div>` : ""}
      <div class="drawer-section">
        <button class="btn-delete-sub" onclick="deleteSubmission('${s.id}')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3h9M5 3V2h3v1M10 3l-.7 8H3.7L3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Delete submission
        </button>
      </div>
    `;
  }

  window.deleteSubmission = async function(id) {
    if (!confirm("Delete this submission? This cannot be undone.")) return;
    const res = await fetch(`/api/submissions/${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: auth(),
    });
    const json = await res.json();
    if (!json.ok) { alert("Could not delete: " + (json.error || "unknown error")); return; }
    document.getElementById("drawerOverlay").classList.remove("open");
    await loadSubmissions();
  };

  document.getElementById("drawerClose").addEventListener("click", () => {
    document.getElementById("drawerOverlay").classList.remove("open");
  });
  document.getElementById("drawerOverlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("drawerOverlay"))
      document.getElementById("drawerOverlay").classList.remove("open");
  });

  // ── Links ───────────────────────────────────────────────────────────────────
  async function loadLinks() {
    const res = await fetch("/api/links", { headers: auth() });
    const json = await res.json();
    const container = document.getElementById("linksContent");

    if (!json.ok) { container.innerHTML = `<p style="color:#c53030;font-size:14px;">${json.error}</p>`; return; }

    if (json.links.length === 0) {
      container.innerHTML = `<div class="card"><div class="empty-state">No partner links yet. Create one to start receiving worker applications.</div></div>`;
      return;
    }

    container.innerHTML = `<div class="links-list" id="linksList"></div>`;
    json.links.forEach(l => document.getElementById("linksList").appendChild(buildLinkRow(l)));
  }

  function buildLinkRow(l) {
    const origin = window.location.origin;
    const url = `${origin}/apply/${l.full_slug}`;
    const div = document.createElement("div");
    div.className = "link-row";
    div.id = `link-${l.id}`;
    div.innerHTML = `
      <div class="link-info">
        <div class="link-name">${esc(l.partner_name)}</div>
        <div class="link-meta">${l.partner_country ? esc(l.partner_country) + " · " : ""}Code: <strong>${esc(l.full_slug)}</strong></div>
      </div>
      <div class="link-url" title="${esc(url)}">${esc(url)}</div>
      <button class="copy-btn" data-url="${esc(url)}">Copy</button>
      <span class="status-badge ${l.active ? "active" : "inactive"}">${l.active ? "Active" : "Inactive"}</span>
      <button class="toggle-btn" data-id="${l.id}" data-active="${l.active}">${l.active ? "Disable" : "Enable"}</button>
    `;

    div.querySelector(".copy-btn").addEventListener("click", function () {
      navigator.clipboard.writeText(this.dataset.url).then(() => {
        this.textContent = "Copied!";
        this.classList.add("copied");
        setTimeout(() => { this.textContent = "Copy"; this.classList.remove("copied"); }, 2000);
      });
    });

    div.querySelector(".toggle-btn").addEventListener("click", async function () {
      const newActive = this.dataset.active === "true" ? false : true;
      this.disabled = true;
      const r = await fetch(`/api/links/${this.dataset.id}`, {
        method: "PATCH",
        headers: { ...auth(), "Content-Type": "application/json" },
        body: JSON.stringify({ active: newActive }),
      });
      const rj = await r.json();
      if (rj.ok) {
        // Rebuild the row
        const oldRow = document.getElementById(`link-${l.id}`);
        const newRow = buildLinkRow(rj.link);
        oldRow.replaceWith(newRow);
        refreshUsage();
      } else {
        this.disabled = false;
        if (rj.code === "plan_limit_links") {
          openUpgradeModal();
          return;
        }
        alert(rj.error || "Failed to update link.");
      }
    });

    return div;
  }

  // ── New link form ────────────────────────────────────────────────────────────
  document.getElementById("newLinkBtn").addEventListener("click", () => {
    if (currentUsage && currentUsage.activeLinksLimit !== null && currentUsage.activeLinks >= currentUsage.activeLinksLimit) {
      openUpgradeModal();
      return;
    }
    document.getElementById("newLinkForm").classList.toggle("open");
  });

  document.getElementById("cancelLinkBtn").addEventListener("click", () => {
    document.getElementById("newLinkForm").classList.remove("open");
    document.getElementById("newLinkMsg").innerHTML = "";
    document.getElementById("partnerName").value = "";
    document.getElementById("partnerCountry").value = "";
    document.getElementById("linkCode").value = "";
  });

  document.getElementById("saveLinkBtn").addEventListener("click", async () => {
    const partnerName = document.getElementById("partnerName").value.trim();
    const partnerCountry = document.getElementById("partnerCountry").value.trim();
    const code = document.getElementById("linkCode").value.trim();
    const msgEl = document.getElementById("newLinkMsg");

    if (!partnerName || !code) {
      msgEl.innerHTML = `<div class="form-msg error">Partner name and code are required.</div>`;
      return;
    }

    const btn = document.getElementById("saveLinkBtn");
    btn.disabled = true; btn.textContent = "Creating…";

    const res = await fetch("/api/links", {
      method: "POST",
      headers: { ...auth(), "Content-Type": "application/json" },
      body: JSON.stringify({ partner_name: partnerName, partner_country: partnerCountry || null, code }),
    });
    const json = await res.json();

    btn.disabled = false; btn.textContent = "Create link";

    if (!json.ok) {
      if (json.code === "plan_limit_links") {
        msgEl.innerHTML = `<div class="form-msg error">You've hit your plan's active link limit (${json.limit}). <a href="#" id="msgUpgradeLink" style="color:var(--brand);font-weight:700;">Upgrade to add more</a>.</div>`;
        const up = document.getElementById("msgUpgradeLink");
        if (up) up.addEventListener("click", (e) => { e.preventDefault(); openUpgradeModal(); });
        return;
      }
      msgEl.innerHTML = `<div class="form-msg error">${esc(json.error || "Failed to create link.")}</div>`;
      return;
    }

    refreshUsage();

    // Reset form
    document.getElementById("partnerName").value = "";
    document.getElementById("partnerCountry").value = "";
    document.getElementById("linkCode").value = "";
    msgEl.innerHTML = "";
    document.getElementById("newLinkForm").classList.remove("open");

    // Prepend new row
    const container = document.getElementById("linksContent");
    if (!document.getElementById("linksList")) {
      container.innerHTML = `<div class="links-list" id="linksList"></div>`;
    }
    document.getElementById("linksList").prepend(buildLinkRow(json.link));
  });

  // ── Escape ───────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

})();
</script>
</body>
</html>
